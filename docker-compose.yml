version: "3.9"

services:
  nexora_core:
    image: postgres:16-alpine
    container_name: nexora_core
    environment:
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora_pwd
      POSTGRES_DB: nexora
    volumes:
      - pg_data:/var/lib/postgresql/data
    mem_limit: 1536m
    memswap_limit: 1536m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora -d nexora"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nexora_net

  nexora_data:
    image: mongo:7
    container_name: nexora_data
    volumes:
      - mongo_data:/data/db
    mem_limit: 1024m
    memswap_limit: 1024m
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 20s
    networks:
      - nexora_net

  nexora_storage:
    image: minio/minio:latest
    container_name: nexora_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexora
      MINIO_ROOT_PASSWORD: nexora123
    volumes:
      - minio_data:/data
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - nexora_net

  redis:
    image: redis:7-alpine
    container_name: nexora_cache
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexora_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexora_queue
    environment:
      RABBITMQ_DEFAULT_USER: nexora
      RABBITMQ_DEFAULT_PASS: nexora
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - nexora_net

  svc-auth:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: &svc_health
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on: &base_deps
      nexora_core:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexora_net

  svc-users:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on: *base_deps
    networks:
      - nexora_net

  svc-orders:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on:
      nexora_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora_net

  svc-billing:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on:
      nexora_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexora_net

  svc-notifications:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora_net

  svc-search:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on:
      nexora_data:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora_net

  svc-catalog:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on:
      nexora_core:
        condition: service_healthy
      nexora_data:
        condition: service_healthy
    networks:
      - nexora_net

  svc-inventory:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on:
      nexora_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora_net

  svc-shipping:
    image: nginx:alpine
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck: *svc_health
    depends_on:
      rabbitmq:
        condition: service_healthy
      nexora_core:
        condition: service_healthy
    networks:
      - nexora_net

  svc-analytics:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      nexora_data:
        condition: service_healthy
      nexora_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexora_net

  svc-reporting:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      nexora_core:
        condition: service_healthy
      nexora_data:
        condition: service_healthy
    networks:
      - nexora_net

  svc-audit:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      nexora_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nexora_data:
        condition: service_healthy
    networks:
      - nexora_net

  svc-workflows:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      nexora_core:
        condition: service_healthy
    networks:
      - nexora_net

  svc-documents:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      nexora_storage:
        condition: service_healthy
      nexora_data:
        condition: service_healthy
    networks:
      - nexora_net

  svc-media:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      nexora_storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexora_net

  svc-integrations:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      nexora_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora_net

  svc-ai:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      nexora_data:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora_net

  svc-admin:
    image: nginx:alpine
    mem_limit: 536m
    memswap_limit: 536m
    healthcheck: *svc_health
    depends_on:
      svc-auth:
        condition: service_healthy
      svc-users:
        condition: service_healthy
      svc-analytics:
        condition: service_healthy
    networks:
      - nexora_net

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: nexora_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      svc-auth:
        condition: service_healthy
      svc-users:
        condition: service_healthy
      svc-orders:
        condition: service_healthy
      svc-admin:
        condition: service_healthy
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nexora_net

networks:
  nexora_net:
    name: nexora_net
    driver: bridge

volumes:
  pg_data:
  mongo_data:
  minio_data:
  redis_data:
  rabbitmq_data:
