global:
  scrape_interval: 15s

scrape_configs:
  - job_name: nexora-core
    static_configs:
      - targets:
          - nexora-core.nexora.svc.cluster.local:80
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: region
        replacement: us-east
