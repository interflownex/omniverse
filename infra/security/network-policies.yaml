apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-default-deny
  namespace: nexora
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-allow-ingress-http
  namespace: nexora
spec:
  podSelector:
    matchLabels:
      app: nexora-core
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
